name: E2E Tests

on:
  push:
    branches: [main, develop, 'feature/**']
    paths:
      - 'apps/backend/**'
      - 'apps/frontend/**'
      - 'e2e-tests/**'
  pull_request:
    branches: [main, develop]
  schedule:
    # 每日凌晨 2:00 运行完整回归测试
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_suite:
        description: '测试套件'
        default: '@smoke'
        required: false

env:
  CI: true
  NODE_VERSION: '20'

jobs:
  # ── E2E 测试 (Chromium) ──────────────────────────────────────────────────
  e2e-chromium:
    name: E2E (Chromium) - ${{ github.event.inputs.test_suite || '@smoke' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install pnpm
        run: npm install -g pnpm@8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Start backend service (mock mode)
        run: |
          cd apps/backend
          timeout 60 pnpm dev &
          sleep 30
          curl -f http://localhost:3000/health || echo "Backend may not be fully ready"

      - name: Run E2E tests
        run: |
          pnpm --filter @school-admin/e2e-tests test --project=chromium \
            --grep "${{ github.event.inputs.test_suite || '@smoke' }}"
        env:
          BASE_URL: http://localhost:3000
          API_BASE_URL: http://localhost:3000/api/v1
          ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD || 'Test@2026' }}
          OFFICER_PASSWORD: ${{ secrets.TEST_OFFICER_PASSWORD || 'Test@2026' }}
          TEACHER_PASSWORD: ${{ secrets.TEST_TEACHER_PASSWORD || 'Test@2026' }}
          PARENT_PASSWORD: ${{ secrets.TEST_PARENT_PASSWORD || 'Test@2026' }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-chromium
          path: |
            e2e-tests/reports/
            e2e-tests/test-results/
          retention-days: 14

  # ── API 测试 ─────────────────────────────────────────────────────────────
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install pnpm
        run: npm install -g pnpm@8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start backend
        run: |
          cd apps/backend
          timeout 60 pnpm dev &
          sleep 30

      - name: Run API tests
        run: pnpm --filter @school-admin/e2e-tests test:api
        env:
          API_BASE_URL: http://localhost:3000/api/v1
          ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD || 'Test@2026' }}

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: e2e-tests/reports/junit/results.xml
          retention-days: 14

  # ── 测试摘要 ─────────────────────────────────────────────────────────────
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [e2e-chromium, api-tests]
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate summary
        run: |
          echo "## E2E 测试结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| E2E (Chromium) | ${{ needs.e2e-chromium.result == 'success' && '✅ 通过' || '❌ 失败' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API Tests | ${{ needs.api-tests.result == 'success' && '✅ 通过' || '❌ 失败' }} |" >> $GITHUB_STEP_SUMMARY
          cat $GITHUB_STEP_SUMMARY
