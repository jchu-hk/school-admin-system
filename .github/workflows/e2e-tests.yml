name: E2E Tests

on:
  push:
    branches: [main, develop, 'feature/**']
    paths:
      - 'apps/backend/**'
      - 'apps/frontend/**'
      - 'e2e-tests/**'
  pull_request:
    branches: [main, develop]
  schedule:
    # 每日凌晨 2:00 运行完整回归测试
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test Suite'
        default: '@smoke'
        required: false
      run_performance:
        description: 'Run Performance Tests (k6)'
        type: boolean
        default: false

env:
  CI: true
  NODE_VERSION: '20'

jobs:
  # ── Backend Setup (shared by E2E and API tests) ─────────────────────────
  backend:
    name: Backend Service
    runs-on: ubuntu-latest
    timeout-minutes: 5

    outputs:
      ready: ${{ steps.healthcheck.outputs.ready }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install pnpm
        run: npm install -g pnpm@8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start backend service
        run: |
          cd apps/backend
          pnpm dev &
          echo "Backend started in background, PID=$!"

      - name: Wait for backend health check
        id: healthcheck
        run: |
          MAX_WAIT=90
          INTERVAL=3
          ELAPSED=0
          
          echo "Waiting for backend /health endpoint..."
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "Backend is ready! (waited ${ELAPSED}s)"
              echo "ready=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "Still waiting... (${ELAPSED}s / ${MAX_WAIT}s)"
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done
          
          echo "Backend did not become ready within ${MAX_WAIT}s"
          echo "ready=false" >> $GITHUB_OUTPUT
          curl -v http://localhost:3000/health || true
          exit 1

  # ── E2E Tests (Chromium) ─────────────────────────────────────────────────
  e2e-chromium:
    name: E2E (Chromium) - ${{ github.event.inputs.test_suite || '@smoke' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install pnpm
        run: npm install -g pnpm@8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Ensure backend is running
        run: |
          cd apps/backend
          pnpm dev &
          echo "Backend started"

      - name: Wait for backend
        run: |
          MAX_WAIT=90
          INTERVAL=3
          ELAPSED=0
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "Backend ready after ${ELAPSED}s"
              exit 0
            fi
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done
          echo "Warning: Backend health check timeout, proceeding anyway"

      - name: Run E2E tests
        run: |
          pnpm --filter @school-admin/e2e-tests test --project=chromium \
            --grep "${{ github.event.inputs.test_suite || '@smoke' }}"
        env:
          BASE_URL: http://localhost:3000
          API_BASE_URL: http://localhost:3000/api/v1
          ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD || 'Test@2026' }}
          OFFICER_PASSWORD: ${{ secrets.TEST_OFFICER_PASSWORD || 'Test@2026' }}
          TEACHER_PASSWORD: ${{ secrets.TEST_TEACHER_PASSWORD || 'Test@2026' }}
          PARENT_PASSWORD: ${{ secrets.TEST_PARENT_PASSWORD || 'Test@2026' }}
          TEST_OTP_CODE: ${{ secrets.TEST_OTP_CODE || '123456' }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-chromium
          path: |
            e2e-tests/reports/
            e2e-tests/test-results/
          retention-days: 14

  # ── API Tests ─────────────────────────────────────────────────────────────
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install pnpm
        run: npm install -g pnpm@8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Ensure backend is running
        run: |
          cd apps/backend
          pnpm dev &

      - name: Wait for backend
        run: |
          MAX_WAIT=90
          INTERVAL=3
          ELAPSED=0
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "Backend ready after ${ELAPSED}s"
              exit 0
            fi
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done
          echo "Warning: Backend health check timeout, proceeding anyway"

      - name: Run API tests
        run: pnpm --filter @school-admin/e2e-tests test:api
        env:
          API_BASE_URL: http://localhost:3000/api/v1
          ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD || 'Test@2026' }}

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: e2e-tests/reports/junit/results.xml
          retention-days: 14

  # ── k6 Performance Tests ─────────────────────────────────────────────────
  k6-performance:
    name: k6 Performance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: backend
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' && github.event.inputs.run_performance == 'true'
    # Run nightly (schedule) or on-demand (workflow_dispatch with run_performance=true)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install pnpm
        run: npm install -g pnpm@8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Ensure backend is running
        run: |
          cd apps/backend
          pnpm dev &

      - name: Wait for backend
        run: |
          MAX_WAIT=90
          INTERVAL=3
          ELAPSED=0
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "Backend ready after ${ELAPSED}s"
              exit 0
            fi
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done
          echo "Warning: Backend health check timeout, proceeding anyway"

      - name: Install k6
        run: |
          curl -sL https://github.com/grafana/k6/releases/download/v0.52.0/k6-v0.52.0-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin --strip-components k6-v0.52.0-linux-amd64/k6

      - name: Run k6 Smoke Test (baseline, 5 VUs)
        run: |
          BASE_URL=http://localhost:3000 \
          k6 run e2e-tests/performance/smoke-test.js \
            --out json=e2e-tests/reports/k6-smoke.json
        timeout-minutes: 2

      - name: Run k6 Load Test (ramping to 100 concurrent users)
        run: |
          BASE_URL=http://localhost:3000 \
          k6 run e2e-tests/performance/api-load-test.js \
            --out json=e2e-tests/reports/k6-load.json
        timeout-minutes: 10

      - name: Upload k6 results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-performance-results
          path: e2e-tests/reports/k6-*.json
          retention-days: 14

  # ── Test Summary ─────────────────────────────────────────────────────────
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [e2e-chromium, api-tests, k6-performance]
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate summary
        run: |
          echo "## E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| E2E (Chromium) | ${{ needs.e2e-chromium.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API Tests | ${{ needs.api-tests.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| k6 Performance | ${{ needs.k6-performance.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          cat $GITHUB_STEP_SUMMARY
