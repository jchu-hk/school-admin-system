name: Deploy Test Environment

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Install dependencies
        run: pnpm install

      - name: Build backend
        run: pnpm --filter @school-admin/backend build

      - name: Deploy Backend to Railway
        run: |
          # Install Railway CLI
          npm install -g @railway/cli

          # Deploy backend using token
          export RAILWAY_TOKEN=${{ secrets.RAILWAY_TOKEN }}
          railway up --service backend

      - name: Get Railway URL
        id: railway-url
        run: |
          export RAILWAY_TOKEN=${{ secrets.RAILWAY_TOKEN }}
          URL=$(railway domain | head -1)
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Comment Test URL
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number || 100,
              body: `## 🚀 测试环境已部署

              **后端**: ${{ steps.railway-url.outputs.url }}

              **可用功能**:
              - ✅ 学生出勤管理
              - ✅ 财政模块
              - ✅ AI智能建议
              - ✅ 权限审批

              **API文档**: ${{ steps.railway-url.outputs.url }}/api

              **测试账号**:
              - 用户名: admin@example.com
              - 密码: Test@123

              ---
              *自动部署时间: ${new Date().toLocaleString('zh-CN', {timeZone: 'Asia/Shanghai'})}*`
            })
